<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KimiaPro PumpCalc Offline HTML</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --text: #0f172a;
      --muted: #64748b;
      --line: #dbe4ef;
      --brand-a: #0e7490;
      --brand-b: #2563eb;
      --brand-c: #7c3aed;
      --ok-bg: #ecfdf5;
      --ok-bd: #a7f3d0;
      --warn-bg: #fffbeb;
      --warn-bd: #fde68a;
      --bad-bg: #fff1f2;
      --bad-bd: #fecdd3;
      --sky-bg: #eff6ff;
      --sky-bd: #bfdbfe;
      --orange-bg: #fff7ed;
      --orange-bd: #fed7aa;
      --shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
    }
    body.dark {
      --bg: #020617;
      --panel: #0f172a;
      --panel-soft: #172033;
      --text: #e5eefb;
      --muted: #94a3b8;
      --line: #263449;
      --shadow: 0 12px 32px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, var(--bg), #ffffff 40%, var(--bg));
      color: var(--text);
    }
    body.dark { background: linear-gradient(135deg, #020617, #0b1220 45%, #020617); }
    .app { max-width: 1440px; margin: 0 auto; padding: 16px 18px 28px; }
    .sticky-shell { position: sticky; top: 0; z-index: 20; padding-bottom: 6px; }
    .banner { background: linear-gradient(135deg, var(--brand-a), var(--brand-b) 52%, var(--brand-c)); color: #fff; border-radius: 28px; padding: 14px 18px; box-shadow: var(--shadow); }
    .banner-row { display: flex; gap: 16px; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    .banner-left { display: flex; gap: 14px; align-items: center; min-width: 0; flex: 1 1 auto; }
    .kp-btn { width: 50px; height: 50px; border-radius: 18px; background: linear-gradient(135deg, #0ea5e9, #2563eb 58%, #7c3aed); border: 1px solid rgba(255,255,255,0.18); color: #fff; font-weight: 800; font-size: 18px; letter-spacing: 0.03em; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 1px 0 rgba(255,255,255,0.18); }
    .brand-mini { margin: 0 0 3px; font-size: 11px; text-transform: uppercase; letter-spacing: .16em; color: rgba(255,255,255,.74); font-weight: 700; }
    .title-wrap { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; }
    .title-main { font-size: 16px; font-weight: 700; line-height: 1; }
    .title-sub { font-size: 11px; color: rgba(255,255,255,.84); }
    .banner-desc { margin-top: 10px; font-size: 12px; line-height: 1.35; color: rgba(255,255,255,.92); max-width: 100%; overflow: hidden; text-overflow: ellipsis; }
    .banner-pill { padding: 8px 14px; border-radius: 999px; border: 1px solid rgba(255,255,255,.2); background: rgba(255,255,255,.12); color: #fff; font-weight: 700; font-size: 12px; white-space: nowrap; }
    .popup { position: absolute; top: 62px; left: 0; width: 320px; z-index: 30; background: var(--panel); color: var(--text); border: 1px solid var(--line); border-radius: 18px; padding: 12px; box-shadow: var(--shadow); display: none; }
    .popup.open { display: block; }
    .popup-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; }
    .popup-title { font-weight: 700; font-size: 14px; }
    .popup-sub { font-size: 12px; color: var(--muted); }
    .popup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .kpi-strip { margin-top: 8px; border-radius: 20px; background: rgba(255,255,255,.76); backdrop-filter: blur(8px); padding: 4px; overflow-x: auto; }
    body.dark .kpi-strip { background: rgba(2,6,23,.72); }
    .kpi-grid { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 8px; min-width: 1100px; align-items: stretch; grid-auto-flow: column; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 22px; box-shadow: var(--shadow); }
    .card-header { padding: 0 14px; font-weight: 700; font-size: 16px; display: flex; align-items: center; min-height: 50px; }
    .card-body { padding: 10px 14px 12px; }
    .kpi-card { padding: 8px 10px; border-radius: 18px; border: 1px solid var(--line); min-width: 0; width: 100%; }
    .kpi-label { font-size: clamp(10px, 0.35vw + 8px, 12px); text-transform: uppercase; letter-spacing: .05em; opacity: .7; }
    .kpi-top-row { display: flex; justify-content: flex-start; gap: 8px; align-items: center; }
    .kpi-value-row { display: flex; gap: 6px; align-items: center; margin-top: 6px; width: 100%; }
    .unit-select { border: 1px solid var(--line); background: var(--panel); color: inherit; border-radius: 8px; padding: 1px 6px; font: inherit; font-size: clamp(10px, 0.22vw + 9px, 11px); min-width: 54px; height: 26px; margin-left: auto; }
    body.dark .unit-select { background: var(--panel-soft); }
    .kpi-value { font-size: clamp(26px, 1.1vw + 12px, 38px); font-weight: 700; line-height: 1; min-width: 0; }
    .kpi-unit { display: none; }
    .kpi-note { margin-top: 6px; font-size: clamp(10px, 0.22vw + 9px, 12px); opacity: .82; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
    .tone-good { background: var(--ok-bg); border-color: var(--ok-bd); color: #166534; }
    .tone-warn { background: var(--warn-bg); border-color: var(--warn-bd); color: #92400e; }
    .tone-bad { background: var(--bad-bg); border-color: var(--bad-bd); color: #be123c; }
    .top-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 12px; align-items: stretch; }
    .collapse-btn { border: 1px solid var(--line); background: var(--panel); color: var(--text); width: 30px; height: 30px; padding: 0; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; flex: 0 0 auto; line-height: 1; vertical-align: middle; }
    .info-mini { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 10px; }
    .info-mini .label { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; opacity: .68; }
    .info-mini .value { font-size: 12px; font-weight: 700; line-height: 1.2; word-break: break-word; }
    .grid-2, .grid-3, .grid-4, .grid-7, .grid-8 { display: grid; gap: 8px; }
    .grid-2 { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0,1fr)); }
    .grid-4 { grid-template-columns: repeat(4, minmax(0,1fr)); }
    .grid-7 { display: grid; grid-template-columns: 96px minmax(220px,1.6fr) minmax(150px,.85fr) 100px 120px minmax(140px,.9fr) 140px; gap: 8px; align-items: stretch; }
    .grid-8 { display: grid; grid-template-columns: 1.35fr .78fr .78fr .9fr .78fr .78fr .78fr .78fr; gap: 8px; align-items: stretch; }
    .field-grid { display: grid; gap: 14px; }
    .field-unit { display: grid; grid-template-columns: 1fr 110px; gap: 8px; }
    .muted-box { border-radius: 14px; border: 1px solid var(--line); background: var(--panel-soft); padding: 8px 10px; min-width: 0; }
    .tiny { font-size: 11px; color: var(--muted); line-height: 1.15; }
    .input, .select, .textarea, .btn { font: inherit; }
    .input, .select, .textarea { width: 100%; min-width: 0; border: 1px solid var(--line); background: var(--panel); color: var(--text); border-radius: 12px; padding: 8px 10px; outline: none; }
    .textarea { min-height: 40px; resize: vertical; }
    body.dark .input, body.dark .select, body.dark .textarea { background: var(--panel-soft); }
    .btn { border: 1px solid var(--line); background: var(--panel); color: var(--text); padding: 8px 12px; border-radius: 12px; cursor: pointer; font-weight: 600; }
    .btn.small { padding: 7px 10px; font-size: 13px; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .notes-shell { display:grid; grid-template-columns:auto minmax(0,1fr); gap:10px; align-items:start; }
    .notes-main { display:grid; gap:8px; min-width:0; }
    .notes-controls { display:grid; grid-template-columns:minmax(190px,1fr) minmax(220px,1fr) auto; gap:8px; align-items:center; }
    .tabs { display: flex; gap: 8px; background: var(--panel-soft); border-radius: 18px; padding: 6px; margin-top: 18px; }
    .tab-btn { flex: 1; border: 0; border-radius: 14px; background: transparent; color: var(--muted); padding: 10px 12px; cursor: pointer; font-weight: 700; }
    .tab-btn.active { background: var(--panel); color: var(--text); box-shadow: var(--shadow); }
    .tab-panel { display: none; margin-top: 16px; }
    .tab-panel.active { display: block; }
    .section-grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 14px; }
    .section-grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 14px; }
    .segment-card { border: 1px solid var(--line); border-radius: 16px; padding: 12px; }
    .segment-scroll { max-height: 560px; overflow-y: auto; padding-right: 4px; display: grid; gap: 10px; }
    .segment-grid { display: grid; grid-template-columns: repeat(12, minmax(0,1fr)); gap: 8px; }
    .span-1 { grid-column: span 1; }
    .span-2 { grid-column: span 2; }
    .span-4 { grid-column: span 4; }
    .span-6 { grid-column: span 6; }
    .span-12 { grid-column: span 12; }
    .badge-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .badge { padding: 4px 10px; border-radius: 999px; background: var(--panel-soft); border: 1px solid var(--line); font-size: 12px; }
    .line-pill { display: inline-flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; }
    .line-pill .dot { width: 8px; height: 8px; border-radius: 999px; }
    .line-pill.suction { background: var(--sky-bg); color: #1d4ed8; }
    .line-pill.suction .dot { background: #0ea5e9; }
    .line-pill.discharge { background: var(--orange-bg); color: #c2410c; }
    .line-pill.discharge .dot { background: #f97316; }
    .summary-line.suction { border: 1px solid var(--sky-bd); background: rgba(239,246,255,.55); }
    .summary-line.discharge { border: 1px solid var(--orange-bd); background: rgba(255,247,237,.65); }
    body.dark .summary-line.suction { background: rgba(14,165,233,.08); }
    body.dark .summary-line.discharge { background: rgba(249,115,22,.08); }
    .warn-box { border-radius: 14px; padding: 12px; border: 1px solid var(--bad-bd); background: var(--bad-bg); margin-bottom: 8px; }
    .warn-box.medium { border-color: var(--warn-bd); background: var(--warn-bg); color: #92400e; }
    .warn-box.low { border-color: var(--sky-bd); background: var(--sky-bg); color: #1d4ed8; }
    .ok-box { border-radius: 14px; padding: 12px; border: 1px solid var(--ok-bd); background: var(--ok-bg); color: #166534; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; width: 100%; min-height: 32px; }
    .switch { width: 48px; height: 28px; border-radius: 999px; background: #cbd5e1; position: relative; cursor: pointer; }
    .switch::after { content: ''; position: absolute; width: 22px; height: 22px; border-radius: 999px; background: #fff; top: 3px; left: 3px; transition: .18s; }
    .switch.on { background: #2563eb; }
    .switch.on::after { left: 23px; }
    .curve-wrap { border: 1px solid var(--line); border-radius: 18px; padding: 12px; background: var(--panel-soft); }
    .footer-note { margin-top: 18px; border: 1px solid var(--line); border-radius: 18px; padding: 14px; background: rgba(255,255,255,.7); color: var(--muted); }
    body.dark .footer-note { background: rgba(15,23,42,.8); }
        @media (max-width: 1180px) {
      .section-grid-2, .section-grid-3 { grid-template-columns: 1fr; }
      .grid-7 { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .grid-8 { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .segment-grid { grid-template-columns: repeat(6, minmax(0,1fr)); }
      .span-2, .span-4, .span-6 { grid-column: span 3; }
      .span-12 { grid-column: span 6; }
    }
    @media (max-width: 900px) {
      .notes-controls { grid-template-columns: 1fr; }
    }
    @media (max-width: 760px) {
      .app { padding: 12px; }
      .banner { border-radius: 24px; padding: 14px 16px; }
      .banner-row { align-items: flex-start; justify-content: space-between; flex-wrap: nowrap; gap: 12px; }
      .banner-left { align-items: center; gap: 12px; min-width: 0; flex: 1 1 auto; overflow: hidden; }
      .kp-btn { width: 56px; height: 56px; border-radius: 18px; font-size: 18px; flex: 0 0 auto; }
      .brand-mini { margin-bottom: 4px; font-size: 10px; letter-spacing: .14em; }
      .title-wrap { gap: 6px; align-items: baseline; flex-wrap: nowrap; min-width: 0; }
      .title-main { font-size: 16px; flex: 0 1 auto; min-width: 0; }
      .title-sub { display: none; }
      .banner-desc { margin-top: 8px; font-size: 10px; line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: calc(100vw - 140px); }
      .banner-pill { padding: 8px 14px; font-size: 12px; align-self: flex-start; flex: 0 0 auto; }
      .popup { top: 68px; width: min(320px, calc(100vw - 32px)); }
      .field-unit, .grid-2, .grid-3, .grid-4, .grid-7, .grid-8, .section-grid-2, .section-grid-3 { grid-template-columns: 1fr; }
      .segment-grid { grid-template-columns: 1fr; }
      .span-1, .span-2, .span-4, .span-6, .span-12 { grid-column: auto; }
      .tabs { display: grid; grid-template-columns: repeat(2, 1fr); }
      .kpi-strip { overflow-x: auto; overflow-y: hidden; }
      .kpi-grid { display: grid; grid-template-columns: repeat(6, minmax(150px, 1fr)); justify-content: initial; min-width: 1080px; grid-auto-flow: column; }
      .toggle-row { align-items: flex-start; }
      .notes-shell { grid-template-columns: 1fr; gap: 8px; }
      .notes-controls { grid-template-columns: 1fr; gap: 8px; }
      .notes-controls .btn { width: 100%; }
      .card-header .toggle-row { flex-wrap: wrap; }
      #printReportBtn { width: 100%; }
    }
  </style>
</head>

uty point is broadly aligned with the calculated selection envelope.'); return rec.map(r=>`<div>• ${r}</div>`).join(''); })()}</div></div></div></div></div><div class='card'><div class='card-header'>Pump Curve & Duty Point</div><div class='card-body'><div class='curve-wrap'>${renderCurveSvg(computed)}</div></div></div></div><div class='grid-3' style='margin-top:14px;'>${buildMetricCard('Pump Head @ Duty','length',state.resultUnits.pumpHead,displayedPumpHead,'Interpolated from entered pump curve',curveTone)}${buildMetricCard('Head Margin','length',state.resultUnits.headMargin,displayedHeadMargin,'Positive means pump can overcome calculated duty head',curveTone)}${buildMetricCard('NPSH Margin','length',state.resultUnits.npshMargin,displayedNpshMargin,`NPSHa ${format(convertValue(computed.calc.npsha,'length','m',state.resultUnits.npshMargin))} ${headUnitLabel(state.resultUnits.npshMargin)} vs NPSHr ${format(convertValue(state.npshr,'length','m',state.resultUnits.npshMargin))} ${headUnitLabel(state.resultUnits.npshMargin)}`,npshMarginTone)}</div></div>
      <div class='tab-panel ${state.tab==='results'?'active':''}'><div class='section-grid-3'><div class='card'><div class='card-header'><div class='toggle-row'><span>Head Breakdown</span><select class='unit-select' data-bulk-unit='head-all'>${unitOptions.length.map(u=>`<option value='${u}' ${u===state.resultUnits.tdh?'selected':''}>${headUnitLabel(u)}</option>`).join('')}</select></div></div><div class='card-body field-grid'><div class='toggle-row'><span>Static head</span><span>${format(convertValue(computed.calc.staticHead,'length','m',state.resultUnits.staticHead))} ${headUnitLabel(state.resultUnits.staticHead)}</span></div><div class='toggle-row'><span>Suction friction loss</span><span>${format(convertValue(computed.suction.total,'length','m',state.resultUnits.frictionLoss))} ${headUnitLabel(state.resultUnits.frictionLoss)}</span></div><div class='toggle-row'><span>Discharge friction loss</span><span>${format(convertValue(computed.discharge.total,'length','m',state.resultUnits.frictionLoss))} ${headUnitLabel(state.resultUnits.frictionLoss)}</span></div><div class='toggle-row'><span>Velocity head</span><span>${format(convertValue(computed.calc.velocityHead,'length','m',state.resultUnits.velocityHead))} ${headUnitLabel(state.resultUnits.velocityHead)}</span></div><div class='toggle-row' style='padding-top:8px;border-top:1px solid var(--line);font-weight:700;'><span>Total dynamic head</span><span>${format(displayedTdh)} ${headUnitLabel(state.resultUnits.tdh)}</span></div></div></div><div class='card'><div class='card-header'>Hydraulics</div><div class='card-body field-grid'><div class='toggle-row'><span>Suction velocity</span><span>${format(computed.suction.velocity)} m/s</span></div><div class='toggle-row'><span>Discharge velocity</span><span>${format(computed.discharge.velocity)} m/s</span></div><div class='toggle-row'><span>Suction major loss</span><span>${format(convertValue(computed.suction.major,'length','m',state.resultUnits.frictionLoss))} ${headUnitLabel(state.resultUnits.frictionLoss)}</span></div><div class='toggle-row'><span>Suction minor loss</span><span>${format(convertValue(computed.suction.minor,'length','m',state.resultUnits.frictionLoss))} ${headUnitLabel(state.resultUnits.frictionLoss)}</span></div><div class='toggle-row'><span>Discharge major loss</span><span>${format(convertValue(computed.discharge.major,'length','m',state.resultUnits.frictionLoss))} ${headUnitLabel(state.resultUnits.frictionLoss)}</span></div><div class='toggle-row'><span>Discharge minor loss</span><span>${format(convertValue(computed.discharge.minor,'length','m',state.resultUnits.frictionLoss))} ${headUnitLabel(state.resultUnits.frictionLoss)}</span></div></div></div><div class='card'><div class='card-header'><div class='toggle-row'><span>Power & NPSH</span><div style='display:flex;gap:8px;flex-wrap:wrap;'><select class='unit-select' data-bulk-unit='power-all'>${unitOptions.power.map(u=>`<option value='${u}' ${u===state.resultUnits.selectedMotor?'selected':''}>${powerUnitLabel(u)}</option>`).join('')}</select><select class='unit-select' data-bulk-unit='npsh-all'>${unitOptions.length.map(u=>`<option value='${u}' ${u===state.resultUnits.npsha?'selected':''}>${headUnitLabel(u)}</option>`).join('')}</select></div></div></div><div class='card-body field-grid'><div class='toggle-row'><span>Hydraulic power</span><span>${format(convertValue(computed.calc.hydraulicKW,'power','kW',state.resultUnits.hydraulicPower))} ${powerUnitLabel(state.resultUnits.hydraulicPower)}</span></div><div class='toggle-row'><span>Brake power</span><span>${format(convertValue(computed.calc.brakeKW,'power','kW',state.resultUnits.brakePower))} ${powerUnitLabel(state.resultUnits.brakePower)}</span></div><div class='toggle-row'><span>Motor power</span><span>${format(convertValue(computed.calc.motorKW,'power','kW',state.resultUnits.selectedMotor))} ${powerUnitLabel(state.resultUnits.selectedMotor)}</span></div><div class='toggle-row'><span>Recommended motor</span><span>${format(convertValue(computed.recommendedMotorKW,'power','kW',state.resultUnits.recommendedMotor))} ${powerUnitLabel(state.resultUnits.recommendedMotor)}</span></div><div class='toggle-row'><span>NPSH available</span><span>${format(displayedNpsha)} ${headUnitLabel(state.resultUnits.npsha)}</span></div><div class='toggle-row'><span>Vapor pressure head</span><span>${format(convertValue(computed.calc.vaporHead,'length','m',state.resultUnits.npsha))} ${headUnitLabel(state.resultUnits.npsha)}</span></div></div></div></div><div class='section-grid-2' style='margin-top:14px;'><div class='card'><div class='card-header'>Pipe & Fitting Summary</div><div class='card-body field-grid'>${computed.lineSummaries.map(s=>`<div class='summary-line ${s.title.toLowerCase().includes('suction')?'suction':'discharge'}' style='border-radius:16px;padding:12px;'><div class='line-pill ${s.title.toLowerCase().includes('suction')?'suction':'discharge'}'><span class='dot'></span>${s.title}</div><div class='grid-2' style='margin-top:10px;'><div>Pipe length: <strong>${s.pipeLengthDisplay}</strong></div><div>Total line loss: <strong>${s.totalLossDisplay}</strong></div></div><div class='tiny' style='margin-top:10px;'>Fitting counts</div><div class='badge-row'>${Object.keys(s.fittingCounts).length?Object.entries(s.fittingCounts).map(([name,qty])=>`<span class='badge'>${name}: ${qty}</span>`).join(''):'<span class="tiny">No fittings</span>'}</div><div class='tiny' style='margin-top:10px;'>Top loss contributors</div><div style='display:grid;gap:6px;font-size:14px;'>${s.ranked.map((r,i)=>`<div>${i+1}. ${r.name} (${r.kind}) — ${format(r.loss,3)} m</div>`).join('')}</div></div>`).join('')}</div></div><div class='card'><div class='card-header'>Suction / Discharge Warning Engine</div><div class='card-body'>${computed.warnings.length?computed.warnings.map(w=>`<div class='warn-box ${w.severity==='medium'?'medium':w.severity==='low'?'low':''}'>${w.text}</div>`).join(''):`<div class='ok-box'>No obvious warning flags from the current simplified checks.</div>`}</div></div></div><div class='card' style='margin-top:14px;'><div class='card-header'>Engineering Guidance</div><div class='card-body grid-3'><div class='muted-box' style='background:var(--ok-bg);border-color:var(--ok-bd);color:#166534;'><div style='font-weight:700;'>Healthy suction</div><div style='margin-top:6px;font-size:14px;'>Aim for low suction losses and low inlet velocity. Many liquid services prefer suction velocity around 1 to 1.5 m/s.</div></div><div class='muted-box' style='background:var(--warn-bg);border-color:var(--warn-bd);color:#92400e;'><div style='font-weight:700;'>Check NPSH margin</div><div style='margin-top:6px;font-size:14px;'>Entered NPSHr lets you compare suction capability directly. Keep a safe design margin above vendor requirement.</div></div><div class='muted-box' style='background:var(--sky-bg);border-color:var(--sky-bd);color:#1d4ed8;'><div style='font-weight:700;'>Preliminary sizing only</div><div style='margin-top:6px;font-size:14px;'>Useful for concept and proposal work. Final selection should still be validated against pump curve, BEP, viscosity correction, and service details.</div></div></div></div></div><div class='footer-note'>This version lets each key input and each major result carry its own unit selector. Internally the calculator still stores and computes from consistent base units, so changing display units does not break the final hydraulic results.</div>`;
      bind(); }
    function getSegArray(key){ return key==='suction' ? state.suctionSegments : state.dischargeSegments; }
    function setSegArray(key,val){ if(key==='suction') state.suctionSegments=val; else state.dischargeSegments=val; }
    function bind(){ document.querySelectorAll('[data-tab]').forEach(el=>el.onclick=()=>{ state.tab=el.dataset.tab; render(); }); const kpBtn=document.getElementById('kpBtn'); if(kpBtn) kpBtn.onclick=()=>{ state.showMenu=!state.showMenu; render(); }; const close=document.getElementById('closeMenu'); if(close) close.onclick=()=>{ state.showMenu=false; render(); }; const dark=document.getElementById('darkSwitch'); if(dark) dark.onclick=()=>{ state.dark=!state.dark; render(); }; ['saveQuick','saveProjectBtn'].forEach(id=>{ const el=document.getElementById(id); if(el) el.onclick=saveProjectToLibrary; }); const dup=document.getElementById('dupQuick'); if(dup) dup.onclick=duplicateProject; const exp=document.getElementById('exportQuick'); if(exp) exp.onclick=exportJson; const del=document.getElementById('deleteQuick'); if(del) del.onclick=deleteSelectedProject; const reset=document.getElementById('resetQuick'); if(reset) reset.onclick=resetDefaults; const imp=document.getElementById('importQuick'); if(imp) imp.onchange=e=>importJsonFile(e.target.files?.[0]); const print=document.getElementById('printReportBtn'); if(print) print.onclick=printDutyReport; const toggleNotes=document.getElementById('toggleNotes'); if(toggleNotes) toggleNotes.onclick=()=>{ state.notesOpen=!state.notesOpen; render(); }; const toggleService=document.getElementById('toggleService'); if(toggleService) toggleService.onclick=()=>{ state.serviceOpen=!state.serviceOpen; render(); }; const toggleFlowLiquid=document.getElementById('toggleFlowLiquid'); if(toggleFlowLiquid) toggleFlowLiquid.onclick=()=>{ state.flowLiquidOpen=!state.flowLiquidOpen; render(); }; const toggleSystem=document.getElementById('toggleSystem'); if(toggleSystem) toggleSystem.onclick=()=>{ state.systemOpen=!state.systemOpen; render(); };
      const savedSel=document.getElementById('savedProjectSelect'); if(savedSel) savedSel.onchange=e=>{ state.selectedProjectId=e.target.value; if(e.target.value==='__none__'){ state.hasLoadedSavedProject=false; render(); return; } const found=state.savedProjects.find(p=>p.id===e.target.value); if(found) loadProjectPayload(found.payload,{markAsSaved:true}); render(); };
      const projectName=document.getElementById('projectNameInput'); if(projectName) projectName.oninput=e=>{ state.projectName=e.target.value; render(); };
      const notes=document.getElementById('notesInput'); if(notes) notes.oninput=e=>{ state.notes=e.target.value; };
      ['pumpTag','service','client','jobNo','revision','engineer','reportDate'].forEach(key=>{ const el=document.getElementById(`service-${key}`); if(el) el.oninput=e=>{ state.serviceInfo[key]=e.target.value; }; });
      const liquidPreset=document.getElementById('liquidPreset'); if(liquidPreset) liquidPreset.onchange=e=>{ const found=state.liquidLibrary.find(l=>l.id===e.target.value); if(found) applyLiquid(found); render(); }; const liquidName=document.getElementById('liquidNameInput'); if(liquidName) liquidName.oninput=e=>{ state.liquidNameInput=e.target.value; }; const saveL=document.getElementById('saveLiquidBtn'); if(saveL) saveL.onclick=saveCurrentLiquid; const updL=document.getElementById('updateLiquidBtn'); if(updL) updL.onclick=updateSelectedLiquidDefaults; const delL=document.getElementById('deleteLiquidBtn'); if(delL) delL.onclick=deleteSelectedLiquid;
      const pumpEff=document.getElementById('pumpEffRange'); if(pumpEff) pumpEff.oninput=e=>{ state.pumpEff=Number(e.target.value); render(); }; const motorEff=document.getElementById('motorEffRange'); if(motorEff) motorEff.oninput=e=>{ state.motorEff=Number(e.target.value); render(); }; const vel=document.getElementById('velHeadSwitch'); if(vel) vel.onclick=()=>{ state.includeVelHead=!state.includeVelHead; render(); };
      document.querySelectorAll('[data-num-key]').forEach(el=>{ el.oninput=e=>{ const key=e.target.dataset.numKey; const family=e.target.dataset.numFamily; const displayUnit=e.target.dataset.numDisplayUnit; const baseUnit=e.target.dataset.numBaseUnit; const raw=Number(e.target.value); state[key]=convertValue(raw,family,displayUnit,baseUnit); }; el.onchange=()=>render(); });
      document.querySelectorAll('[data-unit-path]').forEach(el=>{ el.onchange=e=>{ const unitPath=e.target.dataset.unitPath; const parts=unitPath.split('.'); if(parts.length===2) state[parts[0]][parts[1]]=e.target.value; if(unitPath==='inputUnits.curveShutoff'||unitPath==='inputUnits.curveHeadAtRated'||unitPath==='inputUnits.curveHeadAtEnd'||unitPath==='inputUnits.npshr'){ state.inputUnits.curveShutoff=e.target.value; state.inputUnits.curveHeadAtRated=e.target.value; state.inputUnits.curveHeadAtEnd=e.target.value; state.inputUnits.npshr=e.target.value; } if(unitPath==='inputUnits.curveRatedFlow'||unitPath==='inputUnits.curveEndFlow'){ state.inputUnits.curveRatedFlow=e.target.value; state.inputUnits.curveEndFlow=e.target.value; } render(); }; });
      document.querySelectorAll('[data-bulk-unit]').forEach(el=>{ el.onchange=e=>{ const v=e.target.value; if(e.target.dataset.bulkUnit==='head-all'){ ['tdh','staticHead','frictionLoss','velocityHead','curveMargin','pumpHead','headMargin','resultLoss'].forEach(k=>state.resultUnits[k]=v); } if(e.target.dataset.bulkUnit==='power-all'){ ['motorPower','hydraulicPower','brakePower','selectedMotor','recommendedMotor','assessmentPower'].forEach(k=>state.resultUnits[k]=v); } if(e.target.dataset.bulkUnit==='npsh-all'){ ['npsha','npshMargin'].forEach(k=>state.resultUnits[k]=v); } render(); }; });
      document.querySelectorAll('[data-toggle-open]').forEach(el=>el.onclick=()=>{ if(el.dataset.toggleOpen==='suction') state.suctionOpen=!state.suctionOpen; else state.dischargeOpen=!state.dischargeOpen; render(); });
      document.querySelectorAll('[data-add-pipe]').forEach(el=>el.onclick=()=>{ const key=el.dataset.addPipe, arr=getSegArray(key); arr.push({ id:Date.now(),name:'Pipe Run',length:3,diaMm:52.5,odMm:60.3,wallMm:3.90,roughness:materialSpecs['ss_pipe_sch40'].roughness,count:1,kind:'pipe',k:0,materialSpecKey:'ss_pipe_sch40',sizeKey:'2"' }); render(); });
      document.querySelectorAll('[data-add-fit]').forEach(el=>el.onclick=()=>{ const key=el.dataset.addFit, arr=getSegArray(key); arr.push({ id:Date.now(),name:'Std Elbow 90',length:0,diaMm:52.5,odMm:60.3,wallMm:3.90,roughness:materialSpecs['ss_pipe_sch40'].roughness,count:1,kind:'fitting',k:fittingKLibrary['Std Elbow 90'],materialSpecKey:'ss_pipe_sch40',sizeKey:'2"' }); render(); });
      document.querySelectorAll('[data-copy]').forEach(el=>el.onclick=()=>{ const [key,id]=el.dataset.copy.split(':'); const arr=getSegArray(key); const found=arr.find(s=>String(s.id)===id); if(found) arr.push({ ...structuredClone(found), id:Date.now()+Math.floor(Math.random()*1000) }); render(); });
      document.querySelectorAll('[data-del]').forEach(el=>el.onclick=()=>{ const [key,id]=el.dataset.del.split(':'); setSegArray(key, getSegArray(key).filter(s=>String(s.id)!==id)); render(); });
      document.querySelectorAll('[data-seg-kind]').forEach(el=>el.onchange=e=>{ const [key,id]=e.target.dataset.segKind.split(':'); const arr=getSegArray(key); const found=arr.find(s=>String(s.id)===id); if(!found) return; found.kind=e.target.value; if(found.kind==='pipe'){ found.name='Pipe Run'; found.k=0; } else { found.name='Std Elbow 90'; found.k=fittingKLibrary['Std Elbow 90']; } render(); });
      document.querySelectorAll('[data-seg-name]').forEach(el=>el.onchange=e=>{ const [key,id]=e.target.dataset.segName.split(':'); const found=getSegArray(key).find(s=>String(s.id)===id); if(!found) return; found.name=e.target.value; found.k=fittingKLibrary[e.target.value]??found.k; render(); });
      document.querySelectorAll('[data-seg-text]').forEach(el=>el.oninput=e=>{ const [key,id,prop]=e.target.dataset.segText.split(':'); const found=getSegArray(key).find(s=>String(s.id)===id); if(found) found[prop]=e.target.value; });
      document.querySelectorAll('[data-seg-spec]').forEach(el=>el.onchange=e=>{ const [key,id]=e.target.dataset.segSpec.split(':'); const found=getSegArray(key).find(s=>String(s.id)===id); if(!found) return; const spec=materialSpecs[e.target.value]; found.materialSpecKey=e.target.value; found.roughness=spec.roughness; const sizeKey=spec.sizes[found.sizeKey]?found.sizeKey:Object.keys(spec.sizes)[0]; const picked=spec.sizes[sizeKey]; found.sizeKey=sizeKey; found.diaMm=picked.idMm; found.odMm=picked.odMm; found.wallMm=picked.wallMm; render(); });
      document.querySelectorAll('[data-seg-size]').forEach(el=>el.onchange=e=>{ const [key,id]=e.target.dataset.segSize.split(':'); const found=getSegArray(key).find(s=>String(s.id)===id); if(!found) return; const picked=materialSpecs[found.materialSpecKey].sizes[e.target.value]; found.sizeKey=e.target.value; found.diaMm=picked.idMm; found.odMm=picked.odMm; found.wallMm=picked.wallMm; render(); });
      document.querySelectorAll('[data-seg-num]').forEach(el=>el.oninput=e=>{ const [key,id,prop,family,fromUnit,toUnit]=e.target.dataset.segNum.split(':'); const found=getSegArray(key).find(s=>String(s.id)===id); if(!found) return; const raw=Number(e.target.value); found[prop]=family==='raw'?raw:convertValue(raw,family,fromUnit,toUnit); if(prop==='wallMm'&&Number.isFinite(found.odMm)&&Number.isFinite(found.wallMm)){ found.diaMm=Math.max(0, found.odMm - 2*found.wallMm); } if(prop==='diaMm'&&Number.isFinite(found.odMm)&&Number.isFinite(found.diaMm)){ found.wallMm=Math.max(0, (found.odMm - found.diaMm)/2); } });
      document.querySelectorAll('[data-line-unit]').forEach(el=>el.onchange=e=>{ state.inputUnits[e.target.dataset.lineUnit]=e.target.value; render(); });
      window.onbeforeunload=()=>{ localStorage.setItem(LIQUID_STORAGE_KEY, JSON.stringify(state.liquidLibrary)); localStorage.setItem(PROJECTS_STORAGE_KEY, JSON.stringify(state.savedProjects)); };
    }
    try { const liquids=JSON.parse(localStorage.getItem(LIQUID_STORAGE_KEY)||'null'); if(Array.isArray(liquids)&&liquids.length){ const merged=structuredClone(defaultLiquidLibrary); liquids.forEach(item=>{ const idx=merged.findIndex(x=>x.id===item.id); if(idx>=0) merged[idx]=item; else merged.push(item); }); state.liquidLibrary=merged; } } catch {}
    try { const projects=JSON.parse(localStorage.getItem(PROJECTS_STORAGE_KEY)||'[]'); if(Array.isArray(projects)) state.savedProjects=projects; } catch {}
    state.liquidNameInput = getSelectedLiquid().name;
    render();
  </script>
</body>
